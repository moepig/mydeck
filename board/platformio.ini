[platformio]
default_envs = sparkfun_promicro16
src_dir = .

# ---- Pro Micro (ATmega32U4) ------------------------------------
[env:sparkfun_promicro16]
platform    = atmelavr
board       = sparkfun_promicro16
framework   = arduino
build_src_filter =
    +<src/>
    -<src/infrastructure/ch32_*>
    -<src/boards/uiapduino/>
build_flags =
    -Isrc/boards/promicro
lib_deps    = NicoHood/HID-Project @ ^2.6.1

# ---- UIAPduino (CH32V003) — ch32fun + rv003usb -----------------
# 事前セットアップ: board/src/boards/uiapduino/ で `make setup` を実行
#
# 参考:
#   platform-ch32v:  https://github.com/Community-PIO-CH32V/platform-ch32v
#   ch32v003fun:     https://github.com/cnlohr/ch32fun (framework 名は ch32v003fun)
#   rv003usb:        https://github.com/cnlohr/rv003usb/blob/master/platformio.ini
#   UIAPduino setup: https://www.uiap.jp/uiapduino/pro-micro/ch32v003/v1dot4#with-ch32fun-development-environment
#
# board は CH32V003 共通定義を使用 (UIAPduino は CH32V003J4M6, 同一コア)
[env:uiapduino]
platform = https://github.com/Community-PIO-CH32V/platform-ch32v.git
monitor_speed = 115200
board = ch32v003f4p6_evt_r0
framework = ch32v003fun
build_src_filter =
    +<src/boards/uiapduino/>
    +<src/domain/>
    +<ext_src/rv003usb/rv003usb/rv003usb.c>
# rv003usb.S は rv003usb.c と .o 名が衝突するため extra_scripts で別ディレクトリにビルド
# see: https://github.com/cnlohr/rv003usb/blob/master/.github/build_rv003usb.py
extra_scripts = pre:pio_build_rv003usb.py
build_flags     =
    -Isrc/boards/uiapduino
    -Isrc
    -Iext_src/rv003usb/rv003usb
    -Iext_src/rv003usb/lib
upload_protocol = minichlink
upload_flags =
    -c
    0x1209b803

# ---- UIAPduino デバッグ (シリアルログ有効) -----------------------
[env:uiapduino_debug]
extends = env:uiapduino
build_flags =
    ${env:uiapduino.build_flags}
    -DMYDECK_DEBUG=1

# ---- ユニットテスト (PC) ----------------------------------------
[env:native]
platform         = native
test_framework   = unity
build_src_filter = -<*>
build_flags      = -std=c++14
